<!DOCTYPE html>
<html lang="es-AR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Divs y Estilo</title>
        <style>
            body{
                background-color: lightgoldenrodyellow;
                font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
            }
            h1{
                color: rgb(85, 32, 1);
            }
            h2{
                color: maroon;
            }
            #BoxLayout{
                margin: 16px; 
                padding: 16px;
                border: 2px maroon solid;
            }
            .BoxSizing{
                width: 500px;
                height: 200px;
                background-color: blanchedalmond;
            }
            #div3{
                background-color: rgb(223, 223, 200);
            }
        </style>
    </head>
    <body>
        <h1>Estilos aplicando class y id </h1>
        <h2>Box layout</h2>
        <div id="BoxLayout">box con margen, borde y padding</div>
        <h2>box sizing</h2>
        <div class="BoxSizing">Lorem, ipsum dolor sit amet consectetur adipisicing elit. Doloremque, rerum.</div>
        <div class="BoxSizing" id="div3">Lorem ipsum dolor sit amet consectetur adipisicing elit. Eaque, sequi.</div>

        
    </body>
    </html>
